name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # 아이콘 생성
      - name: Generate icons
        run: python create_icons.py

      # PyInstaller로 exe 빌드
      - name: Build exe with PyInstaller
        run: pyinstaller build.spec

      # Inno Setup 설치 (GitHub Actions windows-latest에 기본 포함)
      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: pwsh

      # Release에 exe + 인스톨러 모두 업로드
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TodoMateWidget.exe
            installer_output/TodoMateWidget_Setup_*.exe
          body: |
            ## TodoMate Floating Widget ${{ github.ref_name }}

            ### 다운로드

            | 파일 | 설명 |
            |------|------|
            | `TodoMateWidget_Setup_*.exe` | **인스톨러** (권장) — 설치 마법사, 바탕화면 바로가기, 시작메뉴, 자동실행, 언인스톨 지원 |
            | `TodoMateWidget.exe` | 포터블 버전 — 설치 없이 바로 실행 |

            ### 사용법
            1. 인스톨러 또는 포터블 exe 다운로드
            2. 실행 후 todomate.net 로그인 (최초 1회)
            3. 시스템 트레이에서 보이기/숨기기/종료 제어

            ### 요구사항
            - Windows 10/11
            - Microsoft Edge WebView2 Runtime (대부분 설치되어 있음)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


